    <h1>关于我做的浏览器起始页</h1>
    <p><small>类型: 项目介绍 | UPDATED 2026-06-07</small></p>
    <p>之前闲着没事做了个浏览器起始页，风格跟这个网站差不多，都是仿 Windows 9X 的样子。</p>
    <p>我给它取名叫 <strong>The Internet</strong>，灵感挺简单的：如果互联网本身有个"官方网站"，长什么样？</p>
    <p>功能上很<i>克制？</i>，就是一个搜索框，再加一个瞎写的梦话关于页面，没了。</p>
    <p>为了让它垂直居中显示，当时研究了好一阵 flexbox，我建议你们千万别打开CSS文件看，不然会吓死。</p>
    <p>如果你好奇我写成了什么样，可以<a href="https://cha-at.github.io/the-internet/">点这里看看</a>。</p>
    <p>现在回头看，蠢爆了。不过留着当个纪念也挺好。</p>
